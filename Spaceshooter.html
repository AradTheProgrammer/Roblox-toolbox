<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Space Shooter</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; margin:auto; background:#000; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2-25, y: canvas.height-80, w:50, h:50 };
let bullets = [];
let enemies = [];
let score = 0;
let gameOver = false;

function spawnEnemy(){
    enemies.push({
        x: Math.random()*(canvas.width-40),
        y: -40,
        w:40,
        h:40,
        speed: 2 + score*0.05
    });
}
setInterval(spawnEnemy,1000);

canvas.addEventListener("touchstart", e=>{
    let x = e.touches[0].clientX;
    let y = e.touches[0].clientY;

    if(y < canvas.height/2){
        bullets.push({x:player.x+20,y:player.y});
    } else {
        if(x < canvas.width/2) player.x -= 40;
        else player.x += 40;
    }
});

function update(){
    if(gameOver) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="lime";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    bullets.forEach((b,i)=>{
        b.y-=6;
        ctx.fillStyle="yellow";
        ctx.fillRect(b.x,b.y,5,15);
        if(b.y<0) bullets.splice(i,1);
    });

    enemies.forEach((en,i)=>{
        en.y+=en.speed;
        ctx.fillStyle="red";
        ctx.fillRect(en.x,en.y,en.w,en.h);

        bullets.forEach((b,bi)=>{
            if(b.x<en.x+en.w && b.x+5>en.x && b.y<en.y+en.h && b.y+15>en.y){
                enemies.splice(i,1);
                bullets.splice(bi,1);
                score++;
            }
        });

        if(en.y+en.h>player.y && en.x<player.x+player.w && en.x+en.w>player.x){
            gameOver=true;
        }
    });

    ctx.fillStyle="white";
    ctx.fillText("Score: "+score,20,30);

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-120,canvas.height/2);
    }

    requestAnimationFrame(update);
}
update();
</script>
</body>
