<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoSearch</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
}

.header {
    padding: 15px;
    background: #1c1c1c;
    position: sticky;
    top: 0;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
    font-size: 16px;
}

#results {
    padding: 10px;
}

.game {
    display: flex;
    margin-bottom: 15px;
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
}

.game img {
    width: 130px;
    height: 130px;
    object-fit: cover;
}

.info {
    padding: 10px;
}

.players {
    color: #00ff88;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <input type="text" id="search" placeholder="Search Roblox games...">
</div>

<div id="results"></div>

<script>
const input = document.getElementById("search");

input.addEventListener("keypress", async function(e) {
    if (e.key === "Enter") {

        const query = input.value;
        const proxy = "https://api.allorigins.win/raw?url=";
        const api = `https://games.roblox.com/v1/games/list?keyword=${query}&limit=20`;

        const response = await fetch(proxy + encodeURIComponent(api));
        const data = await response.json();

        const container = document.getElementById("results");
        container.innerHTML = "";

        data.games
            .sort((a,b) => b.playing - a.playing)
            .forEach(game => {

                const thumb = `https://thumbnails.roblox.com/v1/games/icons?universeIds=${game.universeId}&size=256x256&format=Png`;

                const div = document.createElement("div");
                div.className = "game";

                div.innerHTML = `
                    <img src="${thumb}">
                    <div class="info">
                        <h3>${game.name}</h3>
                        <p class="players">👥 ${game.playing} playing</p>
                        <p>👍 ${game.upVotes} Likes</p>
                    </div>
                `;

                container.appendChild(div);
            });
    }
});
</script>

</body>
</html>
