<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoSearch</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
}

.header {
    padding: 15px;
    background: #1c1c1c;
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2a2a2a;
    color: white;
    font-size: 16px;
}

button {
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: #00b06f;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00d084;
}

#results {
    padding: 10px;
}

.game {
    display: flex;
    margin-bottom: 15px;
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
}

.game img {
    width: 130px;
    height: 130px;
    object-fit: cover;
}

.info {
    padding: 10px;
}

.players {
    color: #00ff88;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <input type="text" id="search" placeholder="Search Roblox games...">
    <button onclick="searchGames()">Search</button>
</div>

<div id="results"></div>

<script>
async function searchGames() {

    const query = document.getElementById("search").value;
    if (!query) return;

    const response = await fetch(
        `https://apis.roblox.com/explore-api/v1/search?keyword=${query}&limit=20`
    );

    const data = await response.json();
    const container = document.getElementById("results");
    container.innerHTML = "";

    data.searchResults
        .filter(item => item.contentType === "Game")
        .sort((a,b) => b.playerCount - a.playerCount)
        .forEach(game => {

            const div = document.createElement("div");
            div.className = "game";

            div.onclick = () => {
                window.open(`https://www.roblox.com/games/${game.contentId}`);
            };

            div.innerHTML = `
                <img src="${game.thumbnailUrl}">
                <div class="info">
                    <h3>${game.name}</h3>
                    <p class="players">👥 ${game.playerCount} playing</p>
                </div>
            `;

            container.appendChild(div);
        });
}
</script>

</body>
</html>
